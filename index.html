<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ohtmanTV ⚽️ الرياضة والمباريات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: white; margin: 0; }
        .glass { background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid #222; }
        .channel-card { transition: all 0.3s ease; border-right: 4px solid transparent; }
        .channel-card:hover { background: #1a1a1a; border-right-color: #f97316; }
        .active-channel { background: #1a1a1a; border-right-color: #f97316; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .match-card { background: #111; border: 1px solid #222; border-radius: 15px; }
        .live-dot { animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- الهيدر -->
    <header class="glass p-4 flex justify-between items-center z-50">
        <div class="flex items-center gap-3">
            <div class="bg-orange-600 text-white p-1 px-3 rounded-lg font-black text-2xl shadow-lg shadow-orange-600/20">ohtmanTV</div>
            <span class="text-xs bg-green-600/20 text-green-500 px-2 py-0.5 rounded border border-green-600/30 font-bold">LIVE ON</span>
        </div>
        <div class="flex gap-4 text-xs font-bold text-gray-400">
            <span class="hover:text-orange-500 cursor-pointer">الرئيسية</span>
            <span class="hover:text-orange-500 cursor-pointer border-r border-gray-700 pr-4">جدول المباريات</span>
        </div>
    </header>

    <div class="flex flex-col md:flex-row flex-1 overflow-hidden">
        
        <!-- القائمة الجانبية -->
        <aside class="w-full md:w-80 flex flex-col border-l border-[#222] bg-[#0c0c0c] h-1/3 md:h-full z-10">
            <div class="p-4 space-y-3">
                <input type="text" id="searchInput" placeholder="ابحث عن قناة..." 
                    class="w-full bg-[#151515] border border-[#333] rounded-xl p-3 text-sm focus:outline-none focus:border-orange-500 transition-all text-white">
                
                <div class="flex gap-2 overflow-x-auto no-scrollbar py-1">
                    <button onclick="filterCat('الكل')" class="cat-btn bg-orange-600 px-4 py-1.5 rounded-xl text-xs font-bold">الكل</button>
                    <button onclick="filterCat('رياضة')" class="cat-btn bg-[#222] px-4 py-1.5 rounded-xl text-xs font-bold">رياضة ⚽️</button>
                    <button onclick="filterCat('أخبار')" class="cat-btn bg-[#222] px-4 py-1.5 rounded-xl text-xs font-bold">أخبار</button>
                    <button onclick="filterCat('وثائقية')" class="cat-btn bg-[#222] px-4 py-1.5 rounded-xl text-xs font-bold">وثائقية</button>
                </div>
            </div>

            <div id="channelContainer" class="flex-1 overflow-y-auto p-3 space-y-2 no-scrollbar">
                <!-- القنوات هنا -->
            </div>
        </aside>

        <!-- منطقة العرض الرئيسية -->
        <main class="flex-1 overflow-y-auto no-scrollbar bg-gradient-to-br from-black to-[#050505]">
            <div class="p-4 md:p-8">
                
                <!-- المشغل -->
                <div class="relative w-full aspect-video rounded-3xl overflow-hidden shadow-2xl border border-[#222] bg-black group">
                    <video id="tvPlayer" class="w-full h-full" controls autoplay playsinline></video>
                    <div id="loader" class="absolute inset-0 flex items-center justify-center bg-black/80 hidden">
                        <div class="w-12 h-12 border-4 border-orange-600 border-t-transparent rounded-full animate-spin"></div>
                    </div>
                    <div class="absolute top-4 right-4 bg-red-600 text-white text-[10px] font-bold px-2 py-0.5 rounded flex items-center gap-1 shadow-lg">
                        <span class="w-1.5 h-1.5 bg-white rounded-full live-dot"></span> مباشر
                    </div>
                </div>

                <div class="mt-6">
                    <h2 id="nowPlayingTitle" class="text-3xl font-black">جاري التحميل...</h2>
                    <p id="nowPlayingDesc" class="text-gray-400 text-sm mt-1 uppercase tracking-widest font-bold">انتظر قليلاً 🫡</p>
                </div>

                <!-- جدول المباريات (القسم الجديد) -->
                <div class="mt-12 bg-[#0c0c0c] rounded-3xl p-6 border border-[#222]">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-black flex items-center gap-2">
                            <span class="text-orange-500 text-2xl">⚽️</span> جدول مباريات اليوم
                        </h3>
                        <span class="text-xs text-gray-500">مباشر الآن</span>
                    </div>

                    <div id="matchGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        <!-- البطاقات الرياضية هنا -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const CHANNELS = [
            // قسم الرياضة (روابط مجانية ومستقرة)
            { id: 101, name: "الكأس 1", cat: "رياضة", url: "https://alkass01.itworkscdn.net/alkass01/smil:alkass01.smil/playlist.m3u8", desc: "قناة الكأس القطرية الرياضية" },
            { id: 102, name: "عمان الرياضية", cat: "رياضة", url: "https://minstryinf.itworkscdn.net/omantv/omantvsport.smil/playlist.m3u8", desc: "بث مباشر الدوري العماني والرياضة" },
            { id: 103, name: "نايل سبورت", cat: "رياضة", url: "https://nilesport.itworkscdn.net/nilesport/live/playlist.m3u8", desc: "الرياضة المصرية والعربية" },
            
            // قنوات عامة
            { id: 1, name: "الجزيرة", cat: "أخبار", url: "https://live-hls-web-aja.getaj.net/AJA/index.m3u8", desc: "أخبار قطر والعالم" },
            { id: 2, name: "العربية", cat: "أخبار", url: "https://stream.alarabiya.net/alarabiya/index.m3u8", desc: "بث العربية الحدث" },
            { id: 4, name: "ناسا", cat: "وثائقية", url: "https://ntv-shls.akamaized.net/hls/live/2014041/NASATV-Public/index.m3u8", desc: "الفضاء والعلوم" },
            { id: 5, name: "السعودية قرآن", cat: "إسلامية", url: "https://makkahlive.itworkscdn.net/makkahlive/smil:makkah.smil/playlist.m3u8", desc: "مكة المكرمة" }
        ];

        // جدول مباريات "وهمي" احترافي (يمكنك تحديثه يدوياً يومياً)
        const MATCHES = [
            { home: "ريال مدريد", away: "برشلونة", time: "22:00", league: "الدوري الإسباني", status: "قريباً" },
            { home: "المان سيتي", away: "أرسنال", time: "20:30", league: "الدوري الإنجليزي", status: "مباشر" },
            { home: "الهلال", away: "النصر", time: "21:00", league: "دوري روشن", status: "قريباً" }
        ];

        const video = document.getElementById('tvPlayer');
        const channelContainer = document.getElementById('channelContainer');
        const matchGrid = document.getElementById('matchGrid');
        const loader = document.getElementById('loader');
        let hls = null;

        function playChannel(c) {
            document.getElementById('nowPlayingTitle').innerText = c.name;
            document.getElementById('nowPlayingDesc').innerText = c.cat + " | " + c.desc;
            loader.classList.remove('hidden');

            if (hls) { hls.destroy(); }

            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(c.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    loader.classList.add('hidden');
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = c.url;
                video.play();
                loader.classList.add('hidden');
            }

            document.querySelectorAll('.channel-card').forEach(el => el.classList.remove('active-channel'));
            document.getElementById('ch-' + c.id).classList.add('active-channel');
        }

        function render(filter = "الكل", search = "") {
            channelContainer.innerHTML = "";
            CHANNELS.filter(c => (filter === "الكل" || c.cat === filter) && c.name.includes(search)).forEach(c => {
                const div = document.createElement('div');
                div.id = 'ch-' + c.id;
                div.className = "channel-card p-3 rounded-xl flex items-center justify-between cursor-pointer";
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 flex items-center justify-center bg-gray-900 rounded-lg text-xs font-black">TV</div>
                        <div class="font-bold text-sm">${c.name}</div>
                    </div>
                    <span class="text-[10px] text-gray-600 font-bold">${c.cat}</span>
                `;
                div.onclick = () => playChannel(c);
                channelContainer.appendChild(div);
            });
        }

        function renderMatches() {
            matchGrid.innerHTML = "";
            MATCHES.forEach(m => {
                const div = document.createElement('div');
                div.className = "match-card p-4 flex flex-col items-center justify-center relative";
                div.innerHTML = `
                    <div class="text-[10px] text-orange-500 font-bold mb-3 uppercase tracking-widest">${m.league}</div>
                    <div class="flex items-center justify-between w-full px-2">
                        <span class="text-sm font-bold flex-1 text-center">${m.home}</span>
                        <div class="bg-gray-800 px-3 py-1 rounded-lg text-xs font-black text-white mx-4">VS</div>
                        <span class="text-sm font-bold flex-1 text-center">${m.away}</span>
                    </div>
                    <div class="mt-4 text-[11px] font-bold text-gray-500 flex items-center gap-2">
                        🕒 ${m.time} | <span class="${m.status === 'مباشر' ? 'text-red-600 live-dot' : ''}">${m.status}</span>
                    </div>
                `;
                matchGrid.appendChild(div);
            });
        }

        function filterCat(cat) {
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.replace('bg-orange-600', 'bg-[#222]'));
            event.target.classList.replace('bg-[#222]', 'bg-orange-600');
            render(cat, document.getElementById('searchInput').value);
        }

        document.getElementById('searchInput').oninput = (e) => render("الكل", e.target.value);

        // تشغيل
        render();
        renderMatches();
        playChannel(CHANNELS[0]);
    </script>
</body>
</html>
