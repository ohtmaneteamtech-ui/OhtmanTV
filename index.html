
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ohtmanTV Pro | Fast Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #000; color: #fff; margin:0; padding-bottom: 30px; }
        .neon-green { color: #32cd32; }
        .bg-neon-green { background-color: #32cd32; }
        
        /* شريط علوي أنيق */
        header { background: linear-gradient(to bottom, #111, #000); border-bottom: 2px solid #222; }
        
        /* أزرار الأقسام - لمسة ريمو الاحترافية */
        .cat-btn { padding: 10px 22px; border-radius: 99px; font-weight: 800; font-size: 13px; white-space: nowrap; border: 2px solid #333; transition: 0.3s; cursor: pointer; }
        .cat-active { background-color: #32cd32; color: #000; border-color: #32cd32; box-shadow: 0 0 15px rgba(50, 205, 50, 0.4); }
        
        /* الصندوق الأخضر الأنيق */
        .promo-box { background: linear-gradient(135deg, #c9f2c7, #a8e6a5); border-radius: 35px; padding: 25px; margin: 15px; position: relative; }
        .watch-now { background-color: #32cd32; color: #000; font-weight: 900; font-size: 28px; text-align: center; padding: 12px; border-radius: 20px; margin: -25px 30px 20px 30px; border: 4px solid #000; position: relative; z-index: 5; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        /* شبكة القنوات - مرتبة جداً */
        .ch-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 0 15px; }
        .ch-item { background: #121212; border-radius: 20px; aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border: 1px solid #222; overflow: hidden; }
        .ch-item img { width: 60%; height: 60%; object-fit: contain; }
        .brand-label { position: absolute; bottom: 8px; font-size: 9px; font-weight: 900; color: rgba(255,255,255,0.2); text-transform: uppercase; }

        /* المشغل - شاشة كاملة */
        #player { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        #loader { position: absolute; inset: 0; display: flex; flex-direction: column; items-center; justify-center; background: rgba(0,0,0,0.9); z-index: 10; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <header class="p-6 flex justify-between items-center">
        <div class="text-3xl font-black neon-green italic uppercase">ohtmanTV</div>
        <div class="flex gap-4 items-center text-xl opacity-60"><span>👑</span><span>🔳</span></div>
    </header>

    <!-- الأقسام -->
    <div class="flex gap-3 overflow-x-auto px-5 py-4 no-scrollbar">
        <div class="cat-btn cat-active" onclick="showCat('رياضة', this)">⚽️ رياضة</div>
        <div class="cat-btn" onclick="showCat('المغرب', this)">🇲🇦 المغرب</div>
        <div class="cat-btn" onclick="showCat('عالمي', this)">🖥 تجريبي</div>
    </div>

    <!-- ترحيب مخصص -->
    <div class="text-center py-6 text-4xl font-black italic tracking-tighter">ohtman</div>

    <!-- الصندوق الترويجي -->
    <div class="promo-box">
        <div class="flex flex-wrap justify-around gap-4 opacity-80">
            <img src="https://images.weserv.nl/?url=https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/Laliga_AS_2023.svg/1024px-Laliga_AS_2023.svg.png" class="w-10">
            <img src="https://images.weserv.nl/?url=https://upload.wikimedia.org/wikipedia/en/thumb/f/f2/Premier_League_Logo.svg/1024px-Premier_League_Logo.svg.png" class="w-10">
            <img src="https://images.weserv.nl/?url=https://upload.wikimedia.org/wikipedia/en/thumb/b/bf/UEFA_Champions_League_logo_2.svg/1024px-UEFA_Champions_League_logo_2.svg.png" class="w-14">
            <img src="https://images.weserv.nl/?url=https://upload.wikimedia.org/wikipedia/en/thumb/d/df/Bundesliga_logo_%282017%29.svg/1024px-Bundesliga_logo_%282017%29.svg.png" class="w-10">
        </div>
    </div>
    <div class="watch-now" onclick="playDefault()">شاهد المباشر</div>

    <!-- شبكة القنوات -->
    <div class="ch-grid pt-4" id="grid"></div>

    <!-- نافذة المشاهدة -->
    <div id="player">
        <div class="p-5 flex justify-between bg-[#111] border-b border-gray-900 shadow-2xl">
            <h3 id="pTitle" class="font-black text-xl neon-green italic uppercase">ohtmanTV LIVE</h3>
            <button onclick="closeP()" class="bg-red-600 px-6 py-2 rounded-full font-bold text-xs shadow-lg">إغلاق ❌</button>
        </div>
        <div class="flex-1 relative flex flex-col items-center justify-center p-2 bg-black">
            <div id="loader">
                <div class="w-12 h-12 border-4 border-orange-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-xs text-orange-500 font-bold">جاري الاتصال بالسيرفر...</p>
            </div>
            <video id="v" class="w-full aspect-video rounded-3xl overflow-hidden bg-black shadow-2xl" controls playsinline></video>
            <p class="mt-8 text-gray-700 italic text-[11px] font-black uppercase tracking-[0.4em]">ohtmanTV Pro Experience</p>
        </div>
    </div>

    <script>
        const P = "https://images.weserv.nl/?url=";
        
        // القائمة المرتية (أضفت فيها الرابط الذي أرسلته)
        const CHANNELS = [
            { n: "الرابط التجريبي (جديد)", u: "https://livesg1.rtva.hiway.media/65cea6ac-6944-4e45-b661-9dd47ea45c48/manifest.m3u8", cat: "عالمي", c: "#1a1a1a", img: "📺" },
            { n: "الرياضية المغربية", u: "https://arryadia-hls.snrtlive.ma/arryadia/master.m3u8", cat: "المغرب", c: "#006633", img: P+"https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Arryadia_logo.svg/1024px-Arryadia_logo.svg.png" },
            { n: "بين سبورت News", u: "https://live-hls-web-aje.getaj.net/AJE/index.m3u8", cat: "رياضة", c: "#4b0082", img: P+"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/BeIN_Sports_logo.svg/1024px-BeIN_Sports_logo.svg.png" },
            { n: "دوزيم 2M", u: "http://2m-hls.snrtlive.ma/2m/master.m3u8", cat: "المغرب", bg: "#003399", img: P+"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/2M_Maroc_logo.svg/1024px-2M_Maroc_logo.svg.png" },
            { n: "الجزيرة الإخبارية", u: "https://live-hls-web-aja.getaj.net/AJA/index.m3u8", cat: "عالمي", c: "#111", img: P+"https://upload.wikimedia.org/wikipedia/ar/thumb/a/a2/Aljazeera_Channel_Logo.svg/1200px-Aljazeera_Channel_Logo.svg.png" },
            { n: "الكأس 1", u: "https://alkass01.itworkscdn.net/alkass01/smil:alkass01.smil/playlist.m3u8", cat: "رياضة", c: "#800000", img: P+"https://upload.wikimedia.org/wikipedia/ar/thumb/d/d4/Alkass-logo.png/1200px-Alkass-logo.png" }
        ];

        const v = document.getElementById('v');
        const p = document.getElementById('player');
        const grid = document.getElementById('grid');
        const loader = document.getElementById('loader');
        let h = null;

        function showCat(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('cat-active'));
            if(btn) btn.classList.add('cat-active');
            
            grid.innerHTML = "";
            CHANNELS.filter(ch => ch.cat === cat).forEach(ch => {
                const div = document.createElement('div');
                div.className = "ch-item flex flex-col items-center mb-2 shadow-xl";
                div.onclick = () => playC(ch.u, ch.n);
                div.innerHTML = `
                    <div class="h-full w-full flex items-center justify-center p-3" style="background-color: ${ch.c || '#111'}; opacity: 0.9;">
                        ${ch.img.length > 2 ? `<img src="${ch.img}">` : `<span class="text-3xl">${ch.img}</span>`}
                    </div>
                    <span class="brand-label text-white">ohtmanTV</span>
                `;
                grid.appendChild(div);
            });
        }

        function playC(url, name) {
            document.getElementById('pTitle').innerText = name;
            p.style.display = 'flex';
            loader.style.display = 'flex'; // إظهار اللودر

            if (h) h.destroy();

            if (Hls.isSupported()) {
                // إعدادات خاصة لتحسين سرعة التحميل وتجاوز التأخير
                h = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    xhrSetup: function(xhr, url) { xhr.withCredentials = false; }
                });
                h.loadSource(url);
                h.attachMedia(v);
                h.on(Hls.Events.MANIFEST_PARSED, () => {
                   v.play().then(() => loader.style.display = 'none').catch(e => loader.style.display = 'none');
                });
                h.on(Hls.Events.ERROR, (e, data) => {
                   if(data.fatal) { alert("خطأ في تشغيل القناة، قد يكون الرابط معطلاً."); closeP(); }
                });
            } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
                v.src = url;
                v.play().then(() => loader.style.display = 'none').catch(e => loader.style.display = 'none');
            }
        }

        function closeP() { p.style.display = 'none'; v.pause(); if (h) h.destroy(); }
        function playDefault() { playC(CHANNELS[0].u, CHANNELS[0].n); }

        // تشغيل الرياضة عند البداية
        showCat('رياضة');
    </script>
</body>
    </html>
