<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ohtmanTV - التلفزيون الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: white; margin: 0; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid #333; }
        .channel-card { transition: all 0.3s ease; border: 1px solid transparent; }
        .channel-card:hover { transform: scale(1.02); background: #1a1a1a; border-color: #f97316; }
        .active-channel { background: rgba(249, 115, 22, 0.15); border-color: #f97316; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- الهيدر (العنوان) -->
    <header class="glass p-4 flex justify-between items-center z-50">
        <div class="flex items-center gap-2">
            <span class="bg-orange-600 text-white px-3 py-1 rounded-br-2xl rounded-tl-2xl font-black text-xl">ohtmanTV</span>
        </div>
        <div class="text-xs text-gray-500 font-mono">LIVE STREAMING</div>
    </header>

    <div class="flex flex-col md:flex-row flex-1 overflow-hidden">
        
        <!-- قائمة القنوات (الجانبية) -->
        <aside class="w-full md:w-96 flex flex-col border-l border-[#222] bg-[#0c0c0c] h-1/2 md:h-full">
            <div class="p-4 space-y-3">
                <input type="text" id="searchInput" placeholder="ابحث عن قناتك المفضلة..." 
                    class="w-full bg-[#151515] border border-[#333] rounded-xl p-3 text-sm focus:outline-none focus:border-orange-500 transition-all">
                
                <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                    <button onclick="filterCat('الكل')" class="cat-btn bg-orange-600 px-4 py-1 rounded-full text-xs whitespace-nowrap">الكل</button>
                    <button onclick="filterCat('أخبار')" class="cat-btn bg-[#222] px-4 py-1 rounded-full text-xs whitespace-nowrap">أخبار</button>
                    <button onclick="filterCat('وثائقية')" class="cat-btn bg-[#222] px-4 py-1 rounded-full text-xs whitespace-nowrap">وثائقية</button>
                    <button onclick="filterCat('إسلامية')" class="cat-btn bg-[#222] px-4 py-1 rounded-full text-xs whitespace-nowrap">إسلامية</button>
                    <button onclick="filterCat('دولية')" class="cat-btn bg-[#222] px-4 py-1 rounded-full text-xs whitespace-nowrap">دولية</button>
                </div>
            </div>

            <div id="channelContainer" class="flex-1 overflow-y-auto p-3 space-y-3 no-scrollbar">
                <!-- القنوات تظهر هنا -->
            </div>
        </aside>

        <!-- منطقة المشغل (الرئيسية) -->
        <main class="flex-1 p-4 md:p-10 flex flex-col justify-center bg-gradient-to-b from-[#0a0a0a] to-black">
            <div class="mb-6">
                <h2 id="nowPlayingTitle" class="text-3xl md:text-5xl font-black text-white mb-2">مرحباً بك في ohtmanTV</h2>
                <p id="nowPlayingDesc" class="text-orange-500 font-bold uppercase tracking-widest text-sm">اختر قناتك وابتدئ المشاهدة 🫡</p>
            </div>

            <div class="relative w-full aspect-video rounded-3xl overflow-hidden shadow-[0_0_50px_rgba(249,115,22,0.1)] border border-[#333] bg-black">
                <video id="tvPlayer" class="w-full h-full" controls autoplay playsinline></video>
                <div id="loader" class="absolute inset-0 flex items-center justify-center bg-black/80 hidden">
                    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-orange-600"></div>
                </div>
            </div>
            
            <div class="mt-6 flex items-center justify-between text-gray-400 text-xs">
                <span>جودة البث: تلقائية (HLS)</span>
                <span>تم التطوير بواسطة: Othman ❤️</span>
            </div>
        </main>
    </div>

    <script>
        const CHANNELS = [
            { id: 1, name: "الجزيرة", cat: "أخبار", url: "https://live-hls-web-aja.getaj.net/AJA/index.m3u8", desc: "بث مباشر من قطر" },
            { id: 2, name: "العربية", cat: "أخبار", url: "https://stream.alarabiya.net/alarabiya/index.m3u8", desc: "بث مباشر من دبي" },
            { id: 3, name: "سكاي نيوز عربية", cat: "أخبار", url: "https://skynewsarabia-main-hls.akamaized.net/hls/live/2104576/sn-main/index.m3u8", desc: "أخبار العالم والمنطقة" },
            { id: 4, name: "ناسا التعليمية (بث الأرض)", cat: "وثائقية", url: "https://ntv-shls.akamaized.net/hls/live/2014041/NASATV-Public/index.m3u8", desc: "بث مباشر من محطة الفضاء الدولية" },
            { id: 5, name: "السعودية قرآن", cat: "إسلامية", url: "https://makkahlive.itworkscdn.net/makkahlive/smil:makkah.smil/playlist.m3u8", desc: "بث مباشر من الحرم المكي" },
            { id: 6, name: "السعودية سنة", cat: "إسلامية", url: "https://madinahlive.itworkscdn.net/madinahlive/smil:madinah.smil/playlist.m3u8", desc: "بث مباشر من المسجد النبوي" },
            { id: 7, name: "بي بي سي عربي", cat: "أخبار", url: "https://vs-hls-push-uk-live.akamaized.net/x=4/i=urn:bbc:pips:service:bbc_arabic_tv/t=3840/v=pv13/b=4352000/main.m3u8", desc: "أخبار بي بي سي بلندن" },
            { id: 8, name: "فرانس 24", cat: "دولية", url: "https://static.france24.com/live/F24_AR_LO_HLS/master.m3u8", desc: "الأخبار الدولية من باريس" },
            { id: 9, name: "تي آر تي عربي", cat: "أخبار", url: "https://trtcanli.akamaized.net/hls/live/2083546/trt_arabi/master.m3u8", desc: "القناة التركية الرسمية" },
            { id: 10, name: "دي دبليو العربية", cat: "دولية", url: "https://dwamdstream-lh.akamaihd.net/i/dwam_arabia_1@534720/master.m3u8", desc: "أخبار من ألمانيا" },
            { id: 11, name: "تلفزيون قطر", cat: "منوعات", url: "https://qtv.itworkscdn.net/qtv/live/playlist.m3u8", desc: "منوعات وبرامج قطرية" },
            { id: 12, name: "الغد الإخبارية", cat: "أخبار", url: "https://alghad.itworkscdn.net/alghad/live/playlist.m3u8", desc: "أول قناة إخبارية عربية من القاهرة" }
        ];

        const video = document.getElementById('tvPlayer');
        const channelContainer = document.getElementById('channelContainer');
        const loader = document.getElementById('loader');
        let hls = null;

        function playChannel(c) {
            document.getElementById('nowPlayingTitle').innerText = c.name;
            document.getElementById('nowPlayingDesc').innerText = c.cat + " | " + c.desc;
            loader.classList.remove('hidden');

            if (hls) { hls.destroy(); }

            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(c.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    loader.classList.add('hidden');
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = c.url;
                video.play();
                loader.classList.add('hidden');
            }

            // تحديث الشكل النشط
            document.querySelectorAll('.channel-card').forEach(el => el.classList.remove('active-channel'));
            document.getElementById('ch-' + c.id).classList.add('active-channel');
        }

        function render(filter = "الكل", search = "") {
            channelContainer.innerHTML = "";
            CHANNELS.filter(c => (filter === "الكل" || c.cat === filter) && c.name.includes(search)).forEach(c => {
                const div = document.createElement('div');
                div.id = 'ch-' + c.id;
                div.className = "channel-card p-3 rounded-2xl flex items-center gap-4 cursor-pointer";
                div.innerHTML = `
                    <div class="w-12 h-12 bg-orange-600/10 flex items-center justify-center rounded-xl text-orange-500 font-bold">TV</div>
                    <div>
                        <div class="font-bold text-sm">${c.name}</div>
                        <div class="text-[10px] text-gray-500 uppercase tracking-tighter">${c.cat}</div>
                    </div>
                `;
                div.onclick = () => playChannel(c);
                channelContainer.appendChild(div);
            });
        }

        function filterCat(cat) {
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.replace('bg-orange-600', 'bg-[#222]'));
            event.target.classList.replace('bg-[#222]', 'bg-orange-600');
            render(cat, document.getElementById('searchInput').value);
        }

        document.getElementById('searchInput').oninput = (e) => render("الكل", e.target.value);

        // البدء
        render();
        playChannel(CHANNELS[0]);
    </script>
</body>
</html>
