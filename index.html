<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ohtmanTV Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #000; color: #fff; margin: 0; padding-bottom: 50px; }
        .neon-green { color: #32CD32; }
        .bg-neon-green { background-color: #32CD32; }
        
        .category-pill { padding: 10px 25px; border-radius: 25px; font-weight: 700; font-size: 13px; white-space: nowrap; border: 1.5px solid #fff; transition: 0.3s; cursor: pointer; }
        .category-pill.active { background-color: #32CD32; color: #000; border-color: #32CD32; }
        
        /* صندوق الدوريات - مطابق للصورة */
        .leagues-box { background-color: #c9f2c7; border-radius: 40px; padding: 30px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; justify-items: center; position: relative; }
        .center-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; z-index: 5; }
        
        .watch-btn { background-color: #32CD32; color: #000; font-weight: 900; font-size: 32px; text-align: center; padding: 15px; border-radius: 25px; margin: -30px 15px 25px 15px; position: relative; border: 5px solid #000; cursor: pointer; z-index: 10; }

        /* بطاقات القنوات - تصميم Remo الفاخر */
        .channel-thumb { width: 100%; aspect-ratio: 1/1; border-radius: 22px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .channel-thumb img { width: 65%; object-fit: contain; }
        .remo-label { position: absolute; bottom: 8px; font-size: 9px; font-weight: 900; color: rgba(255,255,255,0.4); letter-spacing: 1px; }

        #player { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        #playOverlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: none; flex-direction: column; items-center; justify-center; z-index: 50; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <header class="p-5 flex justify-between items-center bg-black">
        <div class="text-5xl font-black neon-green italic tracking-tighter">ohtman</div>
        <div class="flex gap-4 text-2xl text-white"><span>⚙️</span><span>🔄</span><span>🔳</span><span>👑</span></div>
    </header>

    <div class="flex gap-3 overflow-x-auto px-5 py-2 no-scrollbar mb-4">
        <div class="category-pill active" onclick="filterData('رياضة', this)">رياضة</div>
        <div class="category-pill" onclick="filterData('إخبارية', this)">القنوات الإخبارية</div>
        <div class="category-pill" onclick="filterData('وثائقية', this)">وثائقية</div>
        <div class="category-pill" onclick="filterData('دينية', this)">دينية</div>
    </div>

    <div class="text-center text-5xl font-black py-4 tracking-tighter">ohtman</div>

    <!-- صندوق الدوريات مع الصور المصلحة -->
    <div class="px-4 mb-10">
        <div class="leagues-box">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/Laliga_AS_2023.svg/1024px-Laliga_AS_2023.svg.png" class="w-14" referrerPolicy="no-referrer">
            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/f/f2/Premier_League_Logo.svg/1024px-Premier_League_Logo.svg.png" class="w-14" referrerPolicy="no-referrer">
            
            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/b/bf/UEFA_Champions_League_logo_2.svg/1024px-UEFA_Champions_League_logo_2.svg.png" class="center-logo" referrerPolicy="no-referrer">
            
            <div class="h-10"></div><div class="h-10"></div> <!-- مساحة فارغة للوسط -->

            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/d/df/Bundesliga_logo_%282017%29.svg/1024px-Bundesliga_logo_%282017%29.svg.png" class="w-14" referrerPolicy="no-referrer">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Ligue1_Uber_Eats_logo.svg/1024px-Ligue1_Uber_Eats_logo.svg.png" class="w-14" referrerPolicy="no-referrer">
        </div>
        <div class="watch-btn" onclick="startWithDefault()">شاهد</div>
    </div>

    <div class="grid grid-cols-3 gap-4 px-4" id="channelGrid"></div>

    <div id="player">
        <div class="p-5 flex justify-between items-center border-b border-gray-900">
            <h3 id="pTitle" class="font-bold text-xl neon-green">بث مباشر</h3>
            <button onclick="closeP()" class="bg-red-600 px-6 py-2 rounded-full font-bold">إغلاق ❌</button>
        </div>
        <div class="flex-1 relative flex flex-col items-center justify-center p-2">
            <div class="relative w-full aspect-video rounded-3xl overflow-hidden bg-black shadow-2xl transition-all">
                <video id="v" class="w-full h-full" controls playsinline></video>
                <div id="playOverlay" onclick="forcePlay()" class="items-center justify-center">
                    <div class="bg-neon-green text-black rounded-full p-6 text-4xl mb-3 shadow-[0_0_30px_#32CD32]">▶️</div>
                    <p class="font-black text-xl">إضغط للتشغيل</p>
                </div>
            </div>
            <p class="mt-8 text-gray-500 italic">ohtmanTV Premium Quality</p>
        </div>
    </div>

    <script>
        const CHANNELS = [
            // رياضة
            { n: "بين سبورت", u: "https://live-hls-web-aje.getaj.net/AJE/index.m3u8", cat: "رياضة", bg: "#4b0082", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/BeIN_Sports_logo.svg/1200px-BeIN_Sports_logo.svg.png" },
            { n: "الكأس الرياضية", u: "https://alkass01.itworkscdn.net/alkass01/smil:alkass01.smil/playlist.m3u8", cat: "رياضة", bg: "#000", img: "https://upload.wikimedia.org/wikipedia/ar/thumb/d/d4/Alkass-logo.png/1200px-Alkass-logo.png" },
            { n: "شاهد سبورت", u: "https://stream.alarabiya.net/alarabiya/index.m3u8", cat: "رياضة", bg: "#004d4d", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Shahid_Logotype.svg/1200px-Shahid_Logotype.svg.png" },
            { n: "ستارز بلاي", u: "https://live-hls-web-aja.getaj.net/AJA/index.m3u8", cat: "رياضة", bg: "#1a1a1a", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Starzplay_logo.svg/2560px-Starzplay_logo.svg.png" },
            { n: "الكأس 2", u: "https://alkass02.itworkscdn.net/alkass02/smil:alkass02.smil/playlist.m3u8", cat: "رياضة", bg: "#800000", img: "https://upload.wikimedia.org/wikipedia/ar/thumb/d/d4/Alkass-logo.png/1200px-Alkass-logo.png" },
            { n: "STC Sport", u: "https://skynewsarabia-main-hls.akamaized.net/hls/live/2104576/sn-main/index.m3u8", cat: "رياضة", bg: "#4b0082", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f6/STC_Logo.svg/1200px-STC_Logo.svg.png" },
            
            // أخبار
            { n: "الجزيرة", u: "https://live-hls-web-aja.getaj.net/AJA/index.m3u8", cat: "إخبارية", bg: "#111", img: "https://upload.wikimedia.org/wikipedia/ar/thumb/a/a2/Aljazeera_Channel_Logo.svg/1200px-Aljazeera_Channel_Logo.svg.png" },
            { n: "سكاي نيوز", u: "https://skynewsarabia-main-hls.akamaized.net/hls/live/2104576/sn-main/index.m3u8", cat: "إخبارية", bg: "#000", img: "https://upload.wikimedia.org/wikipedia/ar/thumb/3/36/Sky_News_Arabia_logo.svg/1200px-Sky_News_Arabia_logo.svg.png" },
            
            // دينية
            { n: "مكة مباشر", u: "https://makkahlive.itworkscdn.net/makkahlive/smil:makkah.smil/playlist.m3u8", cat: "دينية", bg: "#004d00", img: "https://i.ibb.co/vzB76XQ/makkah.png" },
            { n: "المدينة مباشر", u: "https://madinahlive.itworkscdn.net/madinahlive/smil:madinah.smil/playlist.m3u8", cat: "دينية", bg: "#004d00", img: "https://i.ibb.co/8Yj0q0L/madinah.png" }
        ];

        const v = document.getElementById('v');
        const p = document.getElementById('player');
        const overlay = document.getElementById('playOverlay');
        const grid = document.getElementById('channelGrid');
        let h = null;

        function filterData(category, element) {
            if(element) {
                document.querySelectorAll('.category-pill').forEach(btn => btn.classList.remove('active'));
                element.classList.add('active');
            }
            grid.innerHTML = "";
            const filtered = CHANNELS.filter(ch => ch.cat === category);
            filtered.forEach(ch => {
                const div = document.createElement('div');
                div.className = "flex flex-col items-center mb-4";
                div.onclick = () => playChannel(ch.u, ch.n);
                div.innerHTML = `
                    <div class="channel-thumb" style="background-color: ${ch.bg}; border: 1px solid rgba(255,255,255,0.1)">
                        <img src="${ch.img}" referrerPolicy="no-referrer">
                        <span class="remo-label text-white">ohtman</span>
                    </div>
                    <span class="mt-2 text-[11px] font-bold text-center">${ch.n}</span>
                `;
                grid.appendChild(div);
            });
        }

        function playChannel(url, title) {
            document.getElementById('pTitle').innerText = title;
            p.style.display = 'flex';
            overlay.style.display = 'none';
            if (h) h.destroy();
            if (Hls.isSupported()) {
                h = new Hls();
                h.loadSource(url);
                h.attachMedia(v);
                h.on(Hls.Events.MANIFEST_PARSED, () => {
                    v.play().catch(() => overlay.style.display = 'flex');
                });
            } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
                v.src = url;
                v.play().catch(() => overlay.style.display = 'flex');
            }
        }

        function forcePlay() { v.play(); overlay.style.display = 'none'; }
        function closeP() { p.style.display = 'none'; v.pause(); if (h) h.destroy(); }
        function startWithDefault() { playChannel(CHANNELS[0].u, CHANNELS[0].n); }

        filterData('رياضة');
    </script>
</body>
                </html>
