<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ohtmanTV | التلفزيون العائلي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #32cd32; --dark: #000; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--dark); color: #fff; margin: 0; padding-bottom: 40px; }
        
        /* الهيدر الأنيق */
        header { border-bottom: 2px solid #111; background: #000; }
        
        /* التصنيفات - تصميم ريمو الأصلي */
        .cat-pill { padding: 8px 20px; border-radius: 99px; font-weight: 800; font-size: 11px; white-space: nowrap; border: 1.5px solid #222; transition: 0.3s; cursor: pointer; }
        .cat-pill.active { background-color: var(--neon); color: #000; border-color: var(--neon); box-shadow: 0 0 15px rgba(50, 205, 50, 0.4); }
        
        /* الصندوق الأخضر الفاخر للدوريات */
        .league-box { background: linear-gradient(135deg, #c9f2c7, #a8e6a5); border-radius: 35px; padding: 25px; margin: 15px; position: relative; }
        .watch-hero { background-color: var(--neon); color: #000; font-weight: 900; font-size: 26px; text-align: center; padding: 10px; border-radius: 20px; margin: -25px 30px 20px 30px; border: 4px solid #000; position: relative; z-index: 5; box-shadow: 0 8px 15px rgba(0,0,0,0.5); cursor: pointer; }

        /* شبكة القنوات 3x3 المذهلة */
        .ch-box { background: #111; border-radius: 22px; aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border: 1px solid #1a1a1a; overflow: hidden; transition: 0.2s; }
        .ch-box:active { transform: scale(0.95); background: #1a1a1a; }
        .ch-box img { width: 60%; height: 60%; object-fit: contain; }
        .brand-text { position: absolute; bottom: 8px; font-size: 8px; font-weight: 900; color: rgba(255,255,255,0.15); text-transform: uppercase; letter-spacing: 1px; }
        .ch-title { margin-top: 8px; font-size: 11px; font-weight: 700; color: #aaa; text-align: center; }

        /* المشغل العالمي */
        #player { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        #loader { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <!-- نافبار -->
    <header class="p-5 flex justify-between items-center bg-black">
        <div class="text-3xl font-black text-green-500 italic uppercase">ohtmanTV</div>
        <div class="flex gap-4 text-xl opacity-60"><span>⚙️</span><span>🔳</span><span>👑</span></div>
    </header>

    <!-- قائمة التصنيفات الشاملة -->
    <div class="flex gap-2 overflow-x-auto px-4 py-4 no-scrollbar">
        <div class="cat-pill active" onclick="filter('المغرب', this)">🇲🇦 المغرب</div>
        <div class="cat-pill" onclick="filter('رياضة', this)">⚽️ رياضة</div>
        <div class="cat-pill" onclick="filter('أطفال', this)">👧 أطفال</div>
        <div class="cat-pill" onclick="filter('إسلامية', this)">🕋 دينية</div>
        <div class="cat-pill" onclick="filter('أخبار', this)">🌍 أخبار</div>
    </div>

    <!-- ترحيب -->
    <div class="text-center py-4 text-4xl font-black italic tracking-tighter">ohtman</div>

    <!-- صندوق الدوريات ريمو -->
    <div class="px-3 mb-8">
        <div class="league-box">
            <div class="grid grid-cols-2 gap-10 opacity-90 grayscale hover:grayscale-0 transition-all">
                <div class="flex flex-col items-center"><img src="https://images.weserv.nl/?url=https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/Laliga_AS_2023.svg/512px-Laliga_AS_2023.svg.png" class="w-10"></div>
                <div class="flex flex-col items-center"><img src="https://images.weserv.nl/?url=https://upload.wikimedia.org/wikipedia/en/thumb/f/f2/Premier_League_Logo.svg/512px-Premier_League_Logo.svg.png" class="w-10"></div>
                <!-- دوري الأبطال في المنتصف -->
                <div class="col-span-2 flex justify-center py-2">
                    <img src="https://images.weserv.nl/?url=https://upload.wikimedia.org/wikipedia/en/thumb/b/bf/UEFA_Champions_League_logo_2.svg/512px-UEFA_Champions_League_logo_2.svg.png" class="w-16">
                </div>
                <div class="flex flex-col items-center"><img src="https://images.weserv.nl/?url=https://upload.wikimedia.org/wikipedia/en/thumb/d/df/Bundesliga_logo_%282017%29.svg/512px-Bundesliga_logo_%282017%29.svg.png" class="w-10"></div>
                <div class="flex flex-col items-center"><img src="https://images.weserv.nl/?url=https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Ligue1_Uber_Eats_logo.svg/512px-Ligue1_Uber_Eats_logo.svg.png" class="w-10"></div>
            </div>
        </div>
        <div class="watch-hero" onclick="playFirst()">شاهد المباشر</div>
    </div>

    <!-- شبكة القنوات -->
    <div class="grid grid-cols-3 gap-3 px-4" id="grid"></div>

    <!-- شاشة المشغل -->
    <div id="player">
        <div class="p-5 flex justify-between bg-[#080808] border-b border-gray-900 shadow-2xl">
            <h3 id="pTitle" class="font-black text-xl text-green-500 italic uppercase">ohtmanTV Premium</h3>
            <button onclick="closeP()" class="bg-red-600 px-6 py-2 rounded-full font-bold text-xs uppercase">Close ❌</button>
        </div>
        <div class="flex-1 relative flex flex-col items-center justify-center p-2 bg-black">
            <div id="loader">
                <div class="w-10 h-10 border-4 border-green-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 text-[10px] font-bold text-gray-400">CONNECTING TO STREAM...</p>
            </div>
            <video id="v" class="w-full aspect-video rounded-3xl overflow-hidden bg-black shadow-2xl" controls playsinline></video>
            <div class="mt-8 text-gray-800 italic text-[10px] font-black uppercase tracking-[0.5em]">ohtman Unlimited Media</div>
        </div>
    </div>

    <script>
        const P = "https://images.weserv.nl/?url=";
        const CHANNELS = [
            // المغرب
            { n: "الأولى", cat: "المغرب", u: "https://al-aoula-hls.snrtlive.ma/alaoula/master.m3u8", img: P+"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d7/Al_Aoula_logo.svg/512px-Al_Aoula_logo.svg.png", bg: "#990000" },
            { n: "2M المغربية", cat: "المغرب", u: "http://2m-hls.snrtlive.ma/2m/master.m3u8", img: P+"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/2M_Maroc_logo.svg/512px-2M_Maroc_logo.svg.png", bg: "#003399" },
            { n: "الرياضية", cat: "المغرب", u: "https://arryadia-hls.snrtlive.ma/arryadia/master.m3u8", img: P+"https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Arryadia_logo.svg/512px-Arryadia_logo.svg.png", bg: "#006633" },
            { n: "Tamazight", cat: "المغرب", u: "https://tamazight-hls.snrtlive.ma/tamazight/master.m3u8", img: P+"https://upload.wikimedia.org/wikipedia/commons/thumb/d/df/Tamazight_logo.svg/512px-Tamazight_logo.svg.png", bg: "#222" },
            { n: "Medi1 TV", cat: "المغرب", u: "https://medi1tv_hls_arabic-hls.medi1tv.com/medi1tv_hls_arabic/index.m3u8", img: P+"https://upload.wikimedia.org/wikipedia/commons/thumb/7/77/Medi_1_TV_logo.svg/512px-Medi_1_TV_logo.svg.png", bg: "#000" },
            
            // رياضة
            { n: "beIN News", cat: "رياضة", u: "https://live-hls-web-aje.getaj.net/AJE/index.m3u8", img: P+"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/BeIN_Sports_logo.svg/512px-BeIN_Sports_logo.svg.png", bg: "#4b0082" },
            { n: "الكأس 1", cat: "رياضة", u: "https://alkass01.itworkscdn.net/alkass01/smil:alkass01.smil/playlist.m3u8", img: P+"https://upload.wikimedia.org/wikipedia/ar/thumb/d/d4/Alkass-logo.png/512px-Alkass-logo.png", bg: "#800000" },
            { n: "الكأس 2", cat: "رياضة", u: "https://alkass02.itworkscdn.net/alkass02/smil:alkass02.smil/playlist.m3u8", img: P+"https://upload.wikimedia.org/wikipedia/ar/thumb/d/d4/Alkass-logo.png/512px-Alkass-logo.png", bg: "#000" },

            // أطفال
            { n: "Spacetoon", cat: "أطفال", u: "https://free.fullspeed.tv/iptv-query?streaming-ip=https://www.youtube.com/watch?v=5V9Y1fXgG6Y", img: P+"https://upload.wikimedia.org/wikipedia/ar/thumb/8/87/Spacetoon_logo.svg/512px-Spacetoon_logo.svg.png", bg: "#ff00ff" },
            { n: "ماجد", cat: "أطفال", u: "https://adms-live.ercdn.net/majidtv/majidtv.m3u8", img: P+"https://upload.wikimedia.org/wikipedia/ar/thumb/4/4b/Logomajid.png/512px-Logomajid.png", bg: "#00ccff" },

            // دينية
            { n: "مكة مباشر", cat: "إسلامية", u: "https://makkahlive.itworkscdn.net/makkahlive/smil:makkah.smil/playlist.m3u8", img: P+"https://i.ibb.co/vzB76XQ/makkah.png", bg: "#004d00" },
            { n: "المدينة مباشر", cat: "إسلامية", u: "https://madinahlive.itworkscdn.net/madinahlive/smil:madinah.smil/playlist.m3u8", img: P+"https://i.ibb.co/8Yj0q0L/madinah.png", bg: "#004d00" },

            // أخبار
            { n: "الجزيرة", cat: "أخبار", u: "https://live-hls-web-aja.getaj.net/AJA/index.m3u8", img: P+"https://upload.wikimedia.org/wikipedia/ar/thumb/a/a2/Aljazeera_Channel_Logo.svg/512px-Aljazeera_Channel_Logo.svg.png", bg: "#111" },
            { n: "سكاي نيوز", cat: "أخبار", u: "https://skynewsarabia-main-hls.akamaized.net/hls/live/2104576/sn-main/index.m3u8", img: P+"https://upload.wikimedia.org/wikipedia/ar/thumb/3/36/Sky_News_Arabia_logo.svg/512px-Sky_News_Arabia_logo.svg.png", bg: "#000" }
        ];

        const v = document.getElementById('v');
        const p = document.getElementById('player');
        const grid = document.getElementById('grid');
        const loader = document.getElementById('loader');
        let h = null;

        function filter(cat, btn) {
            document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            
            grid.innerHTML = "";
            CHANNELS.filter(ch => ch.cat === cat).forEach(ch => {
                const div = document.createElement('div');
                div.className = "flex flex-col items-center";
                div.onclick = () => playStream(ch.u, ch.n);
                div.innerHTML = `
                    <div class="ch-box shadow-xl" style="background-color: ${ch.bg || '#111'}">
                        <img src="${ch.img}">
                        <span class="brand-text">ohtmanTV</span>
                    </div>
                    <span class="ch-title">${ch.n}</span>
                `;
                grid.appendChild(div);
            });
        }

        function playStream(url, name) {
            document.getElementById('pTitle').innerText = name;
            p.style.display = 'flex';
            loader.style.display = 'flex';

            if (h) h.destroy();

            if (Hls.isSupported()) {
                h = new Hls({ enableWorker: true, lowLatencyMode: true });
                h.loadSource(url);
                h.attachMedia(v);
                h.on(Hls.Events.MANIFEST_PARSED, () => {
                   v.play().then(() => loader.style.display = 'none').catch(e => loader.style.display = 'none');
                });
                h.on(Hls.Events.ERROR, (e, data) => { if (data.fatal) { alert("Server Error! Try another channel."); closeP(); } });
            } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
                v.src = url;
                v.play().then(() => loader.style.display = 'none').catch(e => loader.style.display = 'none');
            }
        }

        function closeP() { p.style.display = 'none'; v.pause(); if (h) h.destroy(); }
        function playFirst() { const activeCat = document.querySelector('.cat-pill.active').innerText.split(' ')[1]; playStream(CHANNELS.find(c => c.cat === activeCat || activeCat === 'المغرب').u, 'ohtmanTV Premium'); }

        // Start With Morocco
        filter('المغرب');
    </script>
</body>
</html>
