
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ohtmanTV Ultra Pro | M3U Loader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #000; color: #fff; margin: 0; padding-bottom: 50px; }
        .neon-green { color: #32cd32; }
        .bg-neon-green { background-color: #32cd32; }
        .category-pill { padding: 8px 20px; border-radius: 20px; font-weight: 700; font-size: 11px; white-space: nowrap; border: 1.5px solid #333; cursor: pointer; }
        .category-pill.active { background-color: #32cd32; color: #000; border-color: #32cd32; }
        .leagues-box { background-color: #c9f2c7; border-radius: 40px; padding: 40px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; align-items: center; justify-items: center; position: relative; }
        .center-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; }
        .watch-btn { background-color: #32cd32; color: #000; font-weight: 900; font-size: 28px; text-align: center; padding: 12px; border-radius: 25px; margin: -25px 20px 20px 20px; border: 4px solid #000; cursor: pointer; z-index: 10; position: relative; }
        .channel-thumb { width: 100%; aspect-ratio: 1/1; border-radius: 24px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #111; border: 1px solid rgba(255,255,255,0.05); }
        .channel-thumb img { width: 70%; height: 70%; object-fit: contain; }
        .remo-label { position: absolute; bottom: 8px; font-size: 9px; font-weight: 900; color: rgba(255,255,255,0.2); text-transform: uppercase; }
        #player { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        #playOverlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: none; flex-direction: column; items-center; justify-center; z-index: 50; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .input-m3u { background: #111; border: 1px solid #333; border-radius: 15px; padding: 12px; width: 100%; font-size: 12px; color: #fff; outline: none; transition: 0.3s; }
        .input-m3u:focus { border-color: #32cd32; }
    </style>
</head>
<body>

    <header class="p-6 flex justify-between items-center bg-black">
        <div class="text-4xl font-black neon-green italic tracking-tighter uppercase leading-none">ohtman</div>
        <div class="flex gap-4 text-xl opacity-70"><span>⚙️</span><span>👑</span></div>
    </header>

    <div class="p-4 space-y-4">
        <!-- قسم إضافة الروابط الخارجية (مثل رابط GitHub) -->
        <div class="space-y-2">
            <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mr-2">أدخل رابط M3U الخارجي</p>
            <div class="flex gap-2">
                <input type="text" id="m3uUrl" placeholder="https://raw.githubusercontent.com/.../list.m3u" class="input-m3u">
                <button onclick="loadExternalM3U()" class="bg-gray-800 px-4 rounded-xl text-xs font-bold hover:bg-orange-600 transition-all">تحميل</button>
            </div>
        </div>

        <div class="flex gap-3 overflow-x-auto no-scrollbar py-2">
            <div class="category-pill active" id="cat-default" onclick="switchCategory('المغربية', this)">🇲🇦 مغربية</div>
            <div class="category-pill" onclick="switchCategory('رياضية', this)">⚽️ رياضية</div>
            <div class="category-pill" onclick="switchCategory('عالمية', this)">🌍 عالمية</div>
        </div>
    </div>

    <div class="text-center text-5xl font-black py-4 tracking-tighter">ohtman</div>

    <div class="px-4 mb-10">
        <div class="leagues-box shadow-2xl">
            <img src="https://images.weserv.nl/?url=https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/Laliga_AS_2023.svg/1024px-Laliga_AS_2023.svg.png" class="w-12">
            <img src="https://images.weserv.nl/?url=https://upload.wikimedia.org/wikipedia/en/thumb/f/f2/Premier_League_Logo.svg/1024px-Premier_League_Logo.svg.png" class="w-12">
            <img src="https://images.weserv.nl/?url=https://upload.wikimedia.org/wikipedia/en/thumb/b/bf/UEFA_Champions_League_logo_2.svg/1024px-UEFA_Champions_League_logo_2.svg.png" class="center-logo">
            <div class="h-10"></div><div class="h-10"></div>
            <img src="https://images.weserv.nl/?url=https://upload.wikimedia.org/wikipedia/en/thumb/d/df/Bundesliga_logo_%282017%29.svg/1024px-Bundesliga_logo_%282017%29.svg.png" class="w-12">
            <img src="https://images.weserv.nl/?url=https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Ligue1_Uber_Eats_logo.svg/1024px-Ligue1_Uber_Eats_logo.svg.png" class="w-12">
        </div>
        <div class="watch-btn" onclick="playDefault()">شاهد الآن</div>
    </div>

    <div class="grid grid-cols-3 gap-4 px-4" id="channelGrid"></div>

    <!-- نافذة المشغل -->
    <div id="player">
        <div class="p-5 flex justify-between items-center bg-[#050505] border-b border-gray-900">
            <h3 id="pTitle" class="font-black text-xl neon-green tracking-tighter italic">LIVE STREAM</h3>
            <button onclick="closeP()" class="bg-red-600 px-6 py-2 rounded-full font-bold text-xs">إغلاق ❌</button>
        </div>
        <div class="flex-1 relative flex flex-col items-center justify-center p-2 bg-black">
            <div class="relative w-full aspect-video rounded-3xl overflow-hidden shadow-[0_0_50px_rgba(0,0,0,1)] bg-[#050505]">
                <video id="v" class="w-full h-full" controls playsinline></video>
                <div id="playOverlay" onclick="forcePlay()">
                    <div class="bg-neon-green text-black rounded-full p-8 text-4xl mb-4 shadow-[0_0_30px_#32cd32]">▶️</div>
                    <p class="font-black text-xl tracking-widest uppercase">Tap to View</p>
                </div>
            </div>
            <p class="mt-8 text-gray-700 italic text-[10px] font-black uppercase tracking-[0.4em]">ohtmanTV Dynamic Engine</p>
        </div>
    </div>

    <script>
        const IMG_P = "https://images.weserv.nl/?url=";
        
        // قائمة القنوات الافتراضية المستقرة
        let dynamicChannels = [
            { n: "الرياضية المغربية", u: "https://arryadia-hls.snrtlive.ma/arryadia/master.m3u8", cat: "المغربية", bg: "#006633", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Arryadia_logo.svg/1024px-Arryadia_logo.svg.png" },
            { n: "beIN Sports News", u: "https://live-hls-web-aje.getaj.net/AJE/index.m3u8", cat: "رياضية", bg: "#4b0082", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/BeIN_Sports_logo.svg/1024px-BeIN_Sports_logo.svg.png" },
            { n: "دوزيم 2M", u: "http://2m-hls.snrtlive.ma/2m/master.m3u8", cat: "المغربية", bg: "#003399", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/2M_Maroc_logo.svg/1024px-2M_Maroc_logo.svg.png" },
            { n: "الجزيرة الإخبارية", u: "https://live-hls-web-aja.getaj.net/AJA/index.m3u8", cat: "عالمية", bg: "#111", img: "https://upload.wikimedia.org/wikipedia/ar/thumb/a/a2/Aljazeera_Channel_Logo.svg/1200px-Aljazeera_Channel_Logo.svg.png" }
        ];

        const v = document.getElementById('v');
        const p = document.getElementById('player');
        const overlay = document.getElementById('playOverlay');
        const grid = document.getElementById('channelGrid');
        let h = null;

        // دالة قراءة روابط M3U الخارجية (مثل رابط GitHub)
        async function loadExternalM3U() {
            const url = document.getElementById('m3uUrl').value;
            if(!url) return alert("يرجى إدخال الرابط أولاً");
            
            alert("جاري الاتصال بسيرفر GitHub وتحليل القنوات...");
            
            try {
                const response = await fetch(url);
                const data = await response.text();
                parseM3U(data);
            } catch (error) {
                alert("خطأ: تأكد من أن الرابط هو رابط 'Raw' (خام) وبدون قيود CORS");
            }
        }

        // محرك تحليل ملفات M3U وتحويلها إلى أزرار Remo
        function parseM3U(content) {
            const lines = content.split('\n');
            const newChannels = [];
            let currentChannel = {};

            lines.forEach(line => {
                if (line.startsWith('#EXTINF:')) {
                    const nameMatch = line.match(/,(.*)$/);
                    const logoMatch = line.match(/tvg-logo="(.*?)"/);
                    currentChannel.n = nameMatch ? nameMatch[1].trim() : "قناة غير معروفة";
                    currentChannel.img = logoMatch ? logoMatch[1] : "";
                    currentChannel.cat = "عالمية";
                    currentChannel.bg = "#111";
                } else if (line.startsWith('http')) {
                    currentChannel.u = line.trim();
                    newChannels.push({...currentChannel});
                    currentChannel = {};
                }
            });

            if(newChannels.length > 0) {
                dynamicChannels = [...dynamicChannels, ...newChannels];
                alert(`تم بنجاح إضافة ${newChannels.length} قناة من الرابط الخارجي!`);
                switchCategory('عالمية');
            }
        }

        function switchCategory(cat, btn) {
            document.querySelectorAll('.category-pill').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            
            grid.innerHTML = "";
            const filtered = dynamicChannels.filter(ch => ch.cat === cat);
            
            filtered.forEach(ch => {
                const div = document.createElement('div');
                div.className = "flex flex-col items-center mb-4";
                div.onclick = () => playChannel(ch.u, ch.n);
                // استخدام بروكسي الصور إذا توفرت صورة القناة
                const finalImg = ch.img ? (ch.img.startsWith('http') ? IMG_P + ch.img : ch.img) : "📺";
                
                div.innerHTML = `
                    <div class="channel-thumb shadow-2xl" style="background-color: ${ch.bg}; border: 1px solid rgba(255,255,255,0.05)">
                        ${ch.img ? `<img src="${finalImg}">` : `<span class="text-2xl">📺</span>`}
                        <span class="remo-label text-white">ohtman</span>
                    </div>
                    <span class="mt-2 text-[9px] font-black text-center text-gray-500 uppercase tracking-tighter">${ch.n.substring(0, 15)}</span>
                `;
                grid.appendChild(div);
            });
        }

        function playChannel(url, title) {
            document.getElementById('pTitle').innerText = title;
            p.style.display = 'flex'; overlay.style.display = 'none';
            if (h) h.destroy();
            if (Hls.isSupported()) {
                h = new Hls(); h.loadSource(url); h.attachMedia(v);
                h.on(Hls.Events.MANIFEST_PARSED, () => v.play().catch(() => overlay.style.display = 'flex'));
            } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
                v.src = url; v.play().catch(() => overlay.style.display = 'flex');
            }
        }

        function forcePlay() { v.play(); overlay.style.display = 'none'; }
        function closeP() { p.style.display = 'none'; v.pause(); if (h) h.destroy(); }
        function playDefault() { playChannel(dynamicChannels[0].u, dynamicChannels[0].n); }

        switchCategory('المغربية');
    </script>
</body>
</html>
