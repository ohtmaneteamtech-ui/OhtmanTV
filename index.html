<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ohtmanTV | الأناقة والرياضة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon-green: #22c55e; --bg-black: #000000; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-black); color: white; margin: 0; }
        
        /* تصميم الأزرار والتصنيفات */
        .cat-pill { padding: 8px 25px; border-radius: 999px; border: 1.5px solid #333; font-weight: bold; white-space: nowrap; transition: 0.3s; }
        .cat-active { background-color: var(--neon-green); color: black; border-color: var(--neon-green); }
        
        /* شبكة القنوات المربعة */
        .channel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; }
        .ch-box { background: #111; border-radius: 15px; aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .ch-box img { width: 60%; object-fit: contain; }
        .ch-label { font-size: 10px; font-weight: bold; margin-top: 8px; color: #aaa; }

        /* منطقة الهيرو الخضراء */
        .hero-card { background-color: #c9f2c7; border-radius: 30px; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; align-items: center; }
        .shاهد-btn { background-color: var(--neon-green); color: black; font-weight: 900; text-align: center; padding: 15px; border-radius: 20px; font-size: 24px; margin-top: -30px; position: relative; z-index: 10; border: 4px solid #000; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* مشغل الفيديو المنبثق */
        #playerOverlay { position: fixed; inset: 0; background: black; z-index: 100; display: none; flex-direction: column; }
    </style>
</head>
<body class="pb-10">

    <!-- نافبار علوي مطابق للورقة -->
    <header class="p-4 flex justify-between items-center">
        <div class="text-4xl font-black text-green-500 italic">ohtman</div>
        <div class="flex gap-4 items-center">
            <span class="text-xl">⚙️</span>
            <span class="text-xl">🔄</span>
            <span class="text-xl">🔳</span>
            <span class="text-xl">👑</span>
        </div>
    </header>

    <!-- قائمة التصنيفات -->
    <div class="flex gap-3 overflow-x-auto px-4 py-2 no-scrollbar">
        <div class="cat-pill cat-active">رياضة</div>
        <div class="cat-pill">القنوات الإخبارية</div>
        <div class="cat-pill">وثائقيات وترفيه</div>
        <div class="cat-pill">دينية</div>
    </div>

    <!-- العنوان الفرعي -->
    <div class="text-center py-6 text-4xl font-black italic">ohtman</div>

    <!-- منطقة دوريات كرة القدم (نفس المربع الأخضر) -->
    <div class="px-4">
        <div class="hero-card">
            <div class="flex flex-col items-center"><img src="https://logodownload.org/wp-content/uploads/2018/05/laliga-logo-0.png" class="w-12 mb-2"><span class="text-black text-[10px] font-bold uppercase">LALIGA</span></div>
            <div class="flex flex-col items-center"><img src="https://logodownload.org/wp-content/uploads/2014/10/premier-league-logo-1.png" class="w-12 mb-2"><span class="text-black text-[10px] font-bold uppercase">Premier League</span></div>
            <div class="col-span-2 flex justify-center"><img src="https://logodownload.org/wp-content/uploads/2014/05/uefa-champions-league-logo-1.png" class="w-20"></div>
            <div class="flex flex-col items-center"><img src="https://logodownload.org/wp-content/uploads/2019/10/bundesliga-logo-0.png" class="w-12 mb-2"><span class="text-black text-[10px] font-bold uppercase">Bundesliga</span></div>
            <div class="flex flex-col items-center"><img src="https://logodownload.org/wp-content/uploads/2021/01/ligue-1-logo-0.png" class="w-12 mb-2"><span class="text-black text-[10px] font-bold uppercase">Ligue 1</span></div>
        </div>
        <div class="shاهد-btn">شاهد</div>
    </div>

    <!-- شبكة القنوات -->
    <div class="channel-grid">
        <!-- قناة beIN -->
        <div class="flex flex-col items-center" onclick="openPlayer('https://live-hls-web-aje.getaj.net/AJE/index.m3u8', 'beIN Sports')">
            <div class="ch-box" style="background: linear-gradient(#4b0082, #000);">
                <img src="https://logodownload.org/wp-content/uploads/2018/07/bein-sports-logo.png">
                <span class="text-[8px] mt-4 opacity-50">ohtman</span>
            </div>
            <span class="ch-label">بين سبورت</span>
        </div>

        <!-- قناة الكأس -->
        <div class="flex flex-col items-center" onclick="openPlayer('https://alkass01.itworkscdn.net/alkass01/smil:alkass01.smil/playlist.m3u8', 'الكأس')">
            <div class="ch-box" style="background: linear-gradient(#800000, #000);">
                <img src="https://logodownload.org/wp-content/uploads/2019/11/alkass-logo.png">
                <span class="text-[8px] mt-4 opacity-50">ohtman</span>
            </div>
            <span class="ch-label">الكأس</span>
        </div>

        <!-- قناة شاهد -->
        <div class="flex flex-col items-center" onclick="openPlayer('https://stream.alarabiya.net/alarabiya/index.m3u8', 'Shahid')">
            <div class="ch-box" style="background: linear-gradient(#004d4d, #000);">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Shahid_Logotype.svg/1200px-Shahid_Logotype.svg.png">
                <span class="text-[8px] mt-4 opacity-50">ohtman</span>
            </div>
            <span class="ch-label">شاهد سبورت</span>
        </div>

        <!-- الجزيرة -->
        <div class="flex flex-col items-center" onclick="openPlayer('https://live-hls-web-aja.getaj.net/AJA/index.m3u8', 'الجزيرة')">
            <div class="ch-box" style="background: #111;">
                <img src="https://upload.wikimedia.org/wikipedia/ar/thumb/a/a2/Aljazeera_Channel_Logo.svg/1200px-Aljazeera_Channel_Logo.svg.png">
            </div>
            <span class="ch-label">الجزيرة</span>
        </div>

        <!-- ناسا -->
        <div class="flex flex-col items-center" onclick="openPlayer('https://ntv-shls.akamaized.net/hls/live/2014041/NASATV-Public/index.m3u8', 'NASA')">
            <div class="ch-box" style="background: #111;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e5/NASA_logo.svg">
            </div>
            <span class="ch-label">ناسا</span>
        </div>
        
        <!-- سكاي نيوز -->
        <div class="flex flex-col items-center" onclick="openPlayer('https://skynewsarabia-main-hls.akamaized.net/hls/live/2104576/sn-main/index.m3u8', 'Sky News')">
            <div class="ch-box" style="background: #111;">
                <img src="https://upload.wikimedia.org/wikipedia/ar/thumb/3/36/Sky_News_Arabia_logo.svg/1200px-Sky_News_Arabia_logo.svg.png">
            </div>
            <span class="ch-label">سكاي نيوز</span>
        </div>
    </div>

    <!-- مشغل الفيديو المنبثق -->
    <div id="playerOverlay">
        <div class="p-4 flex justify-between bg-[#111]">
            <span id="playerTitle" class="font-bold"></span>
            <button onclick="closePlayer()" class="bg-red-600 px-4 py-1 rounded text-sm">إغلاق</button>
        </div>
        <div class="flex-1 flex items-center justify-center">
            <video id="tvVideo" class="w-full aspect-video" controls autoplay playsinline></video>
        </div>
    </div>

    <script>
        const video = document.getElementById('tvVideo');
        const overlay = document.getElementById('playerOverlay');
        let hls = null;

        function openPlayer(url, title) {
            document.getElementById('playerTitle').innerText = title;
            overlay.style.display = 'flex';
            
            if (hls) hls.destroy();

            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
            }
        }

        function closePlayer() {
            overlay.style.display = 'none';
            video.pause();
            if (hls) hls.destroy();
        }
    </script>
</body>
</html>
